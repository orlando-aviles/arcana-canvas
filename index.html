<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcana Canvas</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="icon" href="data:," />
    <link rel="manifest" href="./manifest.json">
  </head>

  <body>
    <!-- Splash screen — fades out after app initialises -->
    <div id="splash">
      <img src="./splash.png" alt="Arcana Canvas" />
    </div>
    <canvas id="space"></canvas>
    <canvas id="animus"></canvas>
    <canvas id="tarotCanvas"></canvas>

    <!-- Canvas header — branding + instructions -->
    <div id="canvasHeader" class="canvasHeader">
      <div class="canvasHeader-title">Arcana Canvas</div>
      <div class="canvasHeader-sub">Tap to draw &nbsp;·&nbsp; Hold for meaning &nbsp;·&nbsp; Drag to move</div>
    </div>

    <!-- Zoom mode crosshair overlay -->
    <div id="zoomOverlay" class="zoomOverlay" aria-hidden="true">
      <svg id="zoomReticle" class="zoomReticle" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" fill="currentColor">
        <!-- Corner brackets -->
        <!-- Top-left -->
        <path d="M8,28 L8,8 L28,8" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Top-right -->
        <path d="M92,8 L112,8 L112,28" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Bottom-left -->
        <path d="M8,92 L8,112 L28,112" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Bottom-right -->
        <path d="M92,112 L112,112 L112,92" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Centre crosshair lines (gap at square) -->
        <line x1="60" y1="38" x2="60" y2="52" stroke-width="2" stroke-linecap="round"/>
        <line x1="60" y1="68" x2="60" y2="82" stroke-width="2" stroke-linecap="round"/>
        <line x1="38" y1="60" x2="52" y2="60" stroke-width="2" stroke-linecap="round"/>
        <line x1="68" y1="60" x2="82" y2="60" stroke-width="2" stroke-linecap="round"/>
        <!-- Centre square -->
        <rect x="52" y="52" width="16" height="16" fill="none" stroke-width="2"/>
        <!-- Centre dot -->
        <circle cx="60" cy="60" r="2" />
      </svg>
      <div class="zoomLabel">View Mode</div>
    </div>

    <!-- Description overlay (tap/hold) -->
    <div id="descOverlay" class="descOverlay" aria-live="polite">
      <div class="descTitleRow">
        <span class="desc-orient-badge" id="descOrientBadge"></span>
        <div id="descTitle" class="descTitle"></div>
      </div>
      <div id="descBody" class="descBody"></div>
      <div class="overlayBtns" id="overlayBtns">
        <button id="descAddCardBtn"   class="overlayActionBtn" type="button" data-tooltip="Save to Journal">&#x271A; Save</button>
        <button id="descSpreadBtn"    class="overlayActionBtn" type="button" data-tooltip="View Spread Index">&#x26B7; Index</button>
        <button id="descGoJournalBtn" class="overlayActionBtn" type="button" data-tooltip="Open Journal">&#x270E; Open</button>
      </div>
    </div>

    <!-- Settings panel (full-screen) -->
    <div id="atmospherePanel" class="atmo-panel" aria-hidden="true" aria-modal="true" role="dialog">
      <div class="atmo-header">
        <span class="atmo-title">Settings</span>
      </div>
      <div class="atmo-body">
        <div class="atmo-section-title">Atmosphere</div>
        <div class="sliderRow">
          <select id="bgSelect">
            <option value="starfield" selected>Starfield</option>
            <option value="particles">Animus</option>
            <option value="snowfall">Snowfall</option>
          </select>
        </div>
        <div class="sliderRow">
          <div class="sliderLabelRow">
            <span>Intensity</span>
            <span class="sliderValue" id="intensityValue">80%</span>
          </div>
          <input id="intensitySlider" type="range" min="0" max="100" value="80" />
        </div>
        <div class="sliderRow">
          <div class="sliderLabelRow">
            <span>Hue A</span>
            <span class="sliderValue" id="hueAValue">245°</span>
          </div>
          <input id="hueASlider" type="range" min="0" max="360" value="245" />
          <div class="huePreview"></div>
        </div>
        <div class="sliderRow">
          <div class="sliderLabelRow">
            <span>Hue B</span>
            <span class="sliderValue" id="hueBValue">285°</span>
          </div>
          <input id="hueBSlider" type="range" min="0" max="360" value="285" />
          <div class="huePreview"></div>
        </div>
        <div class="sliderRow">
          <button id="randomizeBtn" type="button" class="fullWidthBtn">🎲 Randomize Auras</button>
        </div>

        <div class="atmo-section-title">Aura</div>
        <div class="sliderRow toggleRow">
          <span class="toggleLabel">Aura Color</span>
          <label class="toggle">
            <input type="checkbox" id="auraToggle" checked />
            <span class="toggleTrack"><span class="toggleThumb"></span></span>
          </label>
        </div>
        <div class="sliderRow toggleRow">
          <span class="toggleLabel">Auto-cycle Colors</span>
          <label class="toggle">
            <input type="checkbox" id="auraCycleToggle" />
            <span class="toggleTrack"><span class="toggleThumb"></span></span>
          </label>
        </div>
        <div class="sliderRow" id="auraOpacityRow">
          <div class="sliderLabelRow">
            <span>Opacity</span>
            <span class="sliderValue" id="auraOpacityValue">72%</span>
          </div>
          <input id="auraOpacitySlider" type="range" min="10" max="100" value="72" />
        </div>

        <div class="atmo-section-title">Card Aura</div>
        <div class="sliderRow">
          <select id="cardAuraModeSelect">
            <option value="dynamic">Dynamic — updates with aura</option>
            <option value="static">Static — keeps drawn color</option>
            <option value="off">Off — no card aura</option>
          </select>
        </div>

        <div class="atmo-section-title">Display</div>
        <div class="sliderRow toggleRow">
          <span class="toggleLabel">Canvas Header</span>
          <label class="toggle">
            <input type="checkbox" id="headerToggle" checked />
            <span class="toggleTrack"><span class="toggleThumb"></span></span>
          </label>
        </div>

        <div class="atmo-section-title">Performance</div>
        <div class="sliderRow">
          <div class="sliderLabelRow">
            <span>Quality</span>
            <span class="sliderValue" id="perfModeLabel">Full</span>
          </div>
          <select id="perfModeSelect">
            <option value="full">Full — all effects, 60fps</option>
            <option value="balanced">Balanced — 30fps, half stars</option>
            <option value="saver">Battery Saver — no background effects</option>
          </select>
        </div>
        <div class="sliderRow">
          <div class="sliderLabelRow">
            <span>Max Cards</span>
            <span class="sliderValue" id="maxCardsLabel">40</span>
          </div>
          <input id="maxCardsSlider" type="range" min="5" max="60" value="40" />
        </div>
      </div>
      <div class="atmo-bottom-bar">
        <button class="ci-bottom-btn atmo-close" id="atmosphereClose" title="Close">&#x2715;</button>
      </div>
    </div>

    <!-- Hamburger button -->
    <button id="menuBtn" class="menuBtn" type="button" aria-label="Menu" data-tooltip="Menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <!-- Menu panel — reorganized into 4 sections -->
    <div id="menuPanel" class="panel" aria-hidden="true">

      <!-- DRAW -->
      <div class="sectionTitle">Draw</div>
      <div class="sliderRow">
        <select id="deckSelect">
          <option value="text">Text</option>
          <option value="playing">Playing Cards</option>
          <option value="riderwaite">Rider Waite</option>
          <option value="luminousarc">Luminous Arc</option>
          <option value="gilded">Gilded Minima</option>
          <option value="runes">Runes</option>
        </select>
      </div>
      <div class="sliderRow toggleRow">
        <span class="toggleLabel">Reversals</span>
        <label class="toggle">
          <input type="checkbox" id="reversalsToggle" />
          <span class="toggleTrack"><span class="toggleThumb"></span></span>
        </label>
      </div>

      <div class="divider"></div>

      <!-- CANVAS -->
      <div class="sectionTitle">Canvas</div>
      <div class="sliderRow">
        <div class="sliderLabelRow">
          <span>Card Size</span>
          <span class="sliderValue" id="cardSizeValue">100%</span>
        </div>
        <input id="cardSizeSlider" type="range" min="60" max="160" value="100" />
      </div>

      <div class="divider"></div>

      <!-- ACTIONS -->
      <div class="sectionTitle">Actions</div>
        <div class="actionBtnRow">
          <button id="atmosphereBtn" type="button" class="actionIconBtn" title="Settings"     data-tooltip="Settings">&#x2600;</button>
          <button id="journalBtn"    type="button" class="actionIconBtn" title="Journal"      data-tooltip="Journal" data-tooltip="Open Journal">&#x270E;</button>
          <button id="cardIndexBtn"  type="button" class="actionIconBtn" title="Card Index"   data-tooltip="Card Index">&#x26B7;</button>
          <button id="clearBtn"      type="button" class="actionIconBtn" title="Clear Canvas" data-tooltip="Clear Canvas">&#x2298;</button>
        </div>

    </div>

    <script src="./js/state.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/starfield.js"></script>
    <script src="./js/particles-bg.js"></script>
    <script src="./js/tarotDeck.js"></script>
    <script src="./js/gildedMinima.js"></script>
    <script src="./js/runes.js"></script>
    <script src="./js/snowfall.js"></script>
    <script src="./js/meanings.js"></script>
    <script src="./js/cardData.js"></script>
    <script src="./js/cardLore.js"></script>
    <script src="./js/cardIndex.js"></script>
    <script src="./js/journal.js"></script>
    <script src="./js/tarot.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/tooltips.js"></script>
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
