<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarot</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <link rel="icon" href="data:," />
    <link rel="manifest" href="./manifest.json">
  </head>

  <body>
    <canvas id="space"></canvas>
    <canvas id="animus"></canvas>
    <canvas id="tarotCanvas"></canvas>

    <!-- Single hamburger button -->
    <button id="menuBtn" class="menuBtn" type="button" aria-label="Menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <!-- Unified menu panel -->
    <div id="menuPanel" class="panel" aria-hidden="true">

      <!-- DECKS -->
      <div class="sectionTitle">Deck</div>
      <div class="sliderRow">
        <select id="deckSelect">
          <option value="text">Text</option>
          <option value="playing">Playing Cards</option>
          <option value="riderwaite">Rider Waite</option>
          <option value="luminousarc">Luminous Arc</option>
          <option value="gilded">Gilded Minima</option>
        </select>
      </div>

      <!-- REVERSALS -->
      <div class="sliderRow toggleRow">
        <span class="toggleLabel">Reversals</span>
        <label class="toggle">
          <input type="checkbox" id="reversalsToggle" />
          <span class="toggleTrack">
            <span class="toggleThumb"></span>
          </span>
        </label>
      </div>

      <div class="divider"></div>

      <!-- BACKGROUND -->
      <div class="sectionTitle">Background</div>
      <div class="sliderRow">
        <select id="bgSelect">
          <option value="starfield">Starfield</option>
          <option value="particles">Animus</option>
        </select>
      </div>

      <div class="divider"></div>

      <!-- VISUALS -->
      <div class="sectionTitle">Visuals</div>

      <div class="sliderRow">
        <div class="sliderLabelRow">
          <span>Intensity</span>
          <span class="sliderValue" id="intensityValue">80%</span>
        </div>
        <input id="intensitySlider" type="range" min="0" max="100" value="80" />
      </div>

      <div class="sliderRow">
        <div class="sliderLabelRow">
          <span>Card Size</span>
          <span class="sliderValue" id="cardSizeValue">100%</span>
        </div>
        <input id="cardSizeSlider" type="range" min="60" max="160" value="100" />
      </div>

      <div class="sliderRow">
        <div class="sliderLabelRow">
          <span>Hue A</span>
          <span class="sliderValue" id="hueAValue">220°</span>
        </div>
        <input id="hueASlider" type="range" min="0" max="360" value="220" />
        <div class="huePreview"></div>
      </div>

      <div class="sliderRow">
        <div class="sliderLabelRow">
          <span>Hue B</span>
          <span class="sliderValue" id="hueBValue">120°</span>
        </div>
        <input id="hueBSlider" type="range" min="0" max="360" value="120" />
        <div class="huePreview"></div>
      </div>

      <div class="sliderRow">
        <button id="randomizeBtn" type="button" class="fullWidthBtn">🎲 Randomize Auras</button>
      </div>

      <div class="divider"></div>

      <div class="sliderRow">
        <button id="clearBtn" type="button" class="fullWidthBtn">✕ Clear Canvas</button>
      </div>

    </div>

    <!-- Scripts (order matters!) -->
    <script src="./js/state.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/starfield.js"></script>
    <script src="./js/particles-bg.js"></script>
    <script src="./js/tarotDeck.js"></script>
    <script src="./js/gildedMinima.js"></script>
    <script src="./js/tarot.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
