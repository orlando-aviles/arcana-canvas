<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Arcana Canvas — RWS Border Generator</title>
<style>
  body { font-family: system-ui; background: #0d0d1a; color: #fff; padding: 24px; }
  h1 { color: #c9a84c; }
  button { background: #c9a84c; color: #000; border: none; padding: 12px 24px;
           font-size: 16px; border-radius: 8px; cursor: pointer; margin: 8px; }
  button:disabled { opacity: 0.4; }
  #log { background: #111; border-radius: 8px; padding: 16px; margin-top: 16px;
         height: 180px; overflow-y: auto; font-size: 12px; font-family: monospace; }
  #preview { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 16px; }
  #preview canvas { border-radius: 4px; }
  .ok  { color: #7fbd7f; }
  .err { color: #f08080; }
</style>
</head>
<body>
<h1>RWS Border Generator</h1>
<p>Loads each RWS PNG from <code>./decks/RiderWaite/</code>, adds the coded white border,
   and exports new PNGs. Run this from the project root via <code>python3 -m http.server 8080</code>.</p>

<button id="btnGenerate">Generate Bordered RWS</button>
<button id="btnDownload" disabled>Download ZIP</button>
<div id="log"></div>
<div id="preview"></div>

<script>
const LOG = document.getElementById("log");
const PREVIEW = document.getElementById("preview");
let _files = [];

function log(msg, cls) {
  const d = document.createElement("div");
  d.className = cls || "";
  d.textContent = msg;
  LOG.appendChild(d);
  LOG.scrollTop = LOG.scrollHeight;
}

// Card dimensions matching tarot.js drawTarotCard (at s=1)
// w=86, h=140, r=12, pad=4
// We'll render at 3x for quality
const SCALE = 3;
const CW = Math.round(86 * SCALE);
const CH = Math.round(140 * SCALE);
const R  = Math.round(6 * SCALE);  // less rounded corners
const PAD = Math.round(3 * SCALE); // middle ground padding

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBorderedCard(img) {
  const canvas = document.createElement("canvas");
  canvas.width = CW; canvas.height = CH;
  const ctx = canvas.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  const x = 0, y = 0, w = CW, h = CH;

  // White background fill
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, "rgba(255,255,255,0.98)");
  g.addColorStop(1, "rgba(245,245,245,0.96)");
  ctx.fillStyle = g;
  roundRect(ctx, x, y, w, h, R);
  ctx.fill();

  // Outer border
  ctx.strokeStyle = "rgba(0,0,0,0.22)";
  ctx.lineWidth = SCALE;
  roundRect(ctx, x, y, w, h, R);
  ctx.stroke();

  // Inner inset border — follows image boundary
  ctx.strokeStyle = "rgba(0,0,0,0.08)";
  ctx.lineWidth = SCALE;
  roundRect(ctx, x + PAD, y + PAD, w - PAD*2, h - PAD*2, Math.max(2, R - 5*SCALE));
  ctx.stroke();

  // Image clipped inside with minimal padding
  ctx.save();
  roundRect(ctx, x + PAD, y + PAD, w - PAD*2, h - PAD*2, Math.max(2, R - 5*SCALE));
  ctx.clip();
  ctx.drawImage(img, x + PAD, y + PAD, w - PAD*2, h - PAD*2);
  ctx.restore();

  return canvas;
}

// All 78 RWS filenames — matches cardData.js imageName values
const RWS_CARDS = [
  "TheFool","TheMagician","TheHighPriestess","TheEmpress","TheEmperor",
  "TheHierophant","TheLovers","TheChariot","Strength","TheHermit",
  "WheelOfFortune","Justice","TheHangedMan","Death","Temperance",
  "TheDevil","TheTower","TheStar","TheMoon","TheSun","Judgement","TheWorld",
  // Wands
  "AceOfWands","TwoOfWands","ThreeOfWands","FourOfWands","FiveOfWands",
  "SixOfWands","SevenOfWands","EightOfWands","NineOfWands","TenOfWands",
  "PageOfWands","KnightOfWands","QueenOfWands","KingOfWands",
  // Cups
  "AceOfCups","TwoOfCups","ThreeOfCups","FourOfCups","FiveOfCups",
  "SixOfCups","SevenOfCups","EightOfCups","NineOfCups","TenOfCups",
  "PageOfCups","KnightOfCups","QueenOfCups","KingOfCups",
  // Swords
  "AceOfSwords","TwoOfSwords","ThreeOfSwords","FourOfSwords","FiveOfSwords",
  "SixOfSwords","SevenOfSwords","EightOfSwords","NineOfSwords","TenOfSwords",
  "PageOfSwords","KnightOfSwords","QueenOfSwords","KingOfSwords",
  // Pentacles
  "AceOfPentacles","TwoOfPentacles","ThreeOfPentacles","FourOfPentacles","FiveOfPentacles",
  "SixOfPentacles","SevenOfPentacles","EightOfPentacles","NineOfPentacles","TenOfPentacles",
  "PageOfPentacles","KnightOfPentacles","QueenOfPentacles","KingOfPentacles",
];

async function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("Failed: " + src));
    img.src = src;
  });
}

async function generate() {
  _files = [];
  PREVIEW.innerHTML = "";
  document.getElementById("btnGenerate").disabled = true;
  document.getElementById("btnDownload").disabled = true;

  log(`Generating ${RWS_CARDS.length} bordered RWS cards at ${CW}×${CH}px...`);

  let ok = 0, fail = 0;
  for (const name of RWS_CARDS) {
    const src = `./decks/RiderWaite/${name}.png`;
    try {
      const img = await loadImage(src);
      const canvas = drawBorderedCard(img);
      const blob = await new Promise(r => canvas.toBlob(r, "image/png"));
      _files.push({ name: `RiderWaite/${name}.png`, blob });

      // Small preview
      const prev = document.createElement("canvas");
      prev.width = 30; prev.height = 49; prev.title = name;
      prev.getContext("2d").drawImage(canvas, 0, 0, 30, 49);
      PREVIEW.appendChild(prev);
      ok++;
    } catch (e) {
      log(`  ✗ ${name}: ${e.message}`, "err");
      fail++;
    }
    // Yield every 10 cards
    if ((ok + fail) % 10 === 0) await new Promise(r => setTimeout(r, 0));
  }

  log(`Done: ${ok} OK, ${fail} failed.`, "ok");
  document.getElementById("btnGenerate").disabled = false;
  if (_files.length > 0) document.getElementById("btnDownload").disabled = false;
}

async function downloadZip() {
  if (!_files.length) return;
  log("Building ZIP...");
  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
  document.head.appendChild(script);
  await new Promise(r => script.onload = r);
  const zip = new JSZip();
  for (const f of _files) zip.file(f.name, f.blob);
  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rws-bordered.zip";
  a.click();
  log("Downloaded!", "ok");
}

document.getElementById("btnGenerate").addEventListener("click", generate);
document.getElementById("btnDownload").addEventListener("click", downloadZip);
</script>
</body>
</html>
